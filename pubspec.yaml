# pub.dev using `flutter pub publish`. This is preferred for private packages.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  appwrite: ^25.2.0
  flutter_bloc: ^9.1.1
  get_it: ^9.2.1
  equatable: ^2.0.8
  go_router: ^17.3.0
  image_picker: ^1.2.2
  geolocator: ^14.0.2
  connectivity_plus: ^7.1.1
  sqflite: ^2.4.2+1
  path_provider: ^2.1.6
  path: ^1.9.0
  image: ^4.8.0
  google_fonts: ^8.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

flutter:

  uses-material-design: true